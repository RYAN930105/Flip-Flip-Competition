<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶可夢翻翻樂 - 雙人競技版</title>
    <style>
        :root { --poke-blue: #3D7DCA; --poke-yellow: #FFCB05; --bg: #f4f7f6; --p1-color: #ff4757; --p2-color: #2f3542; }
        body { font-family: 'PingFang TC', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; margin: 0; padding-bottom: 50px; overflow-x: hidden; }
        
        body.dark-mode::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle 180px at var(--x, 50%) var(--y, 50%), transparent 80%, rgba(0,0,0,0.95) 100%);
            pointer-events: none; z-index: 1000;
        }

        h1 { color: var(--poke-blue); text-shadow: 2px 2px var(--poke-yellow); margin: 10px 0; }
        
        /* 玩家分數與狀態 */
        .player-board { display: flex; gap: 20px; margin-bottom: 15px; width: 90%; max-width: 500px; }
        .player-box { flex: 1; padding: 15px; border-radius: 15px; background: white; text-align: center; border: 4px solid transparent; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .player-box.active { border-color: var(--poke-yellow); transform: scale(1.05); box-shadow: 0 0 15px var(--poke-yellow); }
        .p1.active { background: var(--p1-color); color: white; }
        .p2.active { background: var(--p2-color); color: white; }
        .score { font-size: 24px; font-weight: bold; }
        .turn-indicator { font-size: 12px; margin-top: 5px; font-weight: bold; }

        .music-panel { background: white; padding: 10px 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; width: 320px; text-align: center; }
        .song-title { font-weight: bold; color: var(--poke-blue); margin-bottom: 5px; font-size: 14px; }
        .progress-container { display: flex; align-items: center; gap: 10px; font-size: 12px; }
        input[type="range"] { flex: 1; cursor: pointer; }
        .music-btns { display: flex; justify-content: center; gap: 15px; margin-top: 8px; }
        .m-btn { background: none; border: 1px solid #ddd; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; font-size: 16px; }

        .controls { margin-bottom: 5px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .lv-btn { padding: 6px 12px; border: 2px solid var(--poke-blue); background: white; border-radius: 15px; cursor: pointer; font-weight: bold; }
        .lv-btn.active { background: var(--poke-blue); color: white; }
        
        .mode-section { background: #eee; padding: 10px; border-radius: 15px; margin-bottom: 15px; display: flex; gap: 10px; align-items: center; }
        .mode-toggle { padding: 6px 15px; border-radius: 15px; border: none; cursor: pointer; font-weight: bold; background: #bbb; color: white; }
        .mode-toggle.on { background: #2ed573; }

        #game-grid { display: grid; gap: 8px; padding: 10px; transition: transform 0.2s; }
        .shake { animation: shake 0.5s; }
        @keyframes shake { 0% { transform: translate(0,0); } 25% { transform: translate(-5px, 5px); } 50% { transform: translate(5px, -5px); } 75% { transform: translate(-5px, -5px); } 100% { transform: translate(0,0); } }

        .card { width: 75px; height: 75px; position: relative; transform-style: preserve-3d; transition: transform 0.4s; cursor: pointer; }
        .card.small { width: 60px; height: 60px; }
        .card.tiny { width: 48px; height: 48px; }
        .card.flipped, .card.matched { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 8px; border: 2px solid #fff; }
        .card-back { background: var(--poke-blue); }
        .card-front { background: white; transform: rotateY(180deg); display: flex; align-items: center; justify-content: center; }
        .card-front img { width: 90%; height: 90%; object-fit: contain; }

        /* 換人特效 */
        #turn-overlay { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 48px; font-weight: bold; color: white; background: rgba(0,0,0,0.7);
            padding: 20px 40px; border-radius: 20px; z-index: 2000; display: none; pointer-events: none;
        }
    </style>
</head>
<body onmousemove="updateLight(event)" onclick="initAudio()">

    <h1>寶可夢翻翻樂 (雙人對戰)</h1>

    <div class="player-board">
        <div id="p1-box" class="player-box p1 active">
            <div>玩家 1</div>
            <div id="p1-score" class="score">0</div>
            <div class="turn-indicator" id="p1-status">YOUR TURN</div>
        </div>
        <div id="p2-box" class="player-box p2">
            <div>玩家 2</div>
            <div id="p2-score" class="score">0</div>
            <div class="turn-indicator" id="p2-status">WAITING</div>
        </div>
    </div>

    <div id="turn-overlay">換人翻牌！</div>

    <div class="music-panel">
        <div class="song-title" id="song-display">點擊頁面開始播放</div>
        <div class="progress-container">
            <span id="cur-time">0:00</span>
            <input type="range" id="progress-bar" value="0" step="1">
            <span id="dur-time">0:00</span>
        </div>
        <div class="music-btns">
            <button class="m-btn" onclick="prevSong(event)">⏮️</button>
            <button class="m-btn" onclick="toggleMute(event)" id="mute-btn">🔊</button>
            <button class="m-btn" onclick="nextSong(event)">⏭️</button>
        </div>
    </div>

    <audio id="bgm"></audio>

    <div class="controls">
        <button class="lv-btn" onclick="changeLevel(0)" id="b0">Lv1</button>
        <button class="lv-btn" onclick="changeLevel(1)" id="b1">Lv2</button>
        <button class="lv-btn" onclick="changeLevel(2)" id="b2">Lv3</button>
        <button class="lv-btn" onclick="changeLevel(3)" id="b3">Lv4</button>
        <button class="lv-btn" onclick="changeLevel(4)" id="b4">Lv5</button>
    </div>

    <div class="mode-section">
        <button class="mode-toggle" id="dark-toggle" onclick="toggleMode('dark')">黑夜模式</button>
        <button class="mode-toggle" id="shake-toggle" onclick="toggleMode('shake')">地震模式</button>
    </div>

    <div id="game-grid"></div>

    <script>
        const imgNames = ['小火龍1.png', '六尾1.png', '太陽伊布1.png', '月亮伊布1.png', '水伊布1.png', '水君1.png', '火伊布1.png', '仙子伊布1.png', '皮卡丘1.png', '伊布1.png', '冰伊布1.png', '克雷色利亞1.png', '利歐路1.png', '妙蛙種子1.png', '固拉多1.png', '帕奇利茲1.png', '帕路奇亞1.png', '炎帝1.png', '阿爾宙斯1.png', '帝牙盧卡1.png', '烈空坐1.png', '索爾迦雷歐1.png', '雷伊布1.png', '葉伊布1.png', '傑尼龜1.png', '超夢1.png', '雷公1.png', '夢幻1.png', '蓋歐卡1.png', '騎拉帝納1.png'];
        const songNames = ["1. 輕音樂", "2. 尿床怎麼啦", "3. 進擊的巨人主題曲", "4. 最後一次", "5. 致青春", "6. 追追追", "7. 卡農", "8. 父親", "9. 第一隻舞", "10. 世間美好與你環環相扣"];
        const levels = [{cards:16, cols:4, size:''}, {cards:24, cols:6, size:''}, {cards:32, cols:8, size:'small'}, {cards:40, cols:8, size:'small'}, {cards:60, cols:10, size:'tiny'}];

        let currentLv = 0, flipped = [], matches = 0, lock = false;
        let scores = [0, 0]; // [p1, p2]
        let currentPlayer = 0; // 0 for P1, 1 for P2
        let modes = { dark: false, shake: false };
        let shakeTimer = null;
        let currentSongNum = 1, isMuted = false, bgmReady = false;

        const bgm = document.getElementById('bgm');
        const prog = document.getElementById('progress-bar');

        // --- 音樂與模式 (保留原邏輯) ---
        function initAudio() { if (!bgmReady) { loadSong(1); bgmReady = true; } }
        function loadSong(num) {
            currentSongNum = num; bgm.src = `bga${num}.mp3`;
            document.getElementById('song-display').innerText = songNames[num-1];
            bgm.play().catch(()=>{});
        }
        function nextSong(e) { if(e) e.stopPropagation(); loadSong(currentSongNum >= 10 ? 1 : currentSongNum + 1); }
        function prevSong(e) { if(e) e.stopPropagation(); loadSong(currentSongNum <= 1 ? 10 : currentSongNum - 1); }
        function toggleMute(e) { if(e) e.stopPropagation(); isMuted = !isMuted; bgm.muted = isMuted; document.getElementById('mute-btn').innerText = isMuted ? "🔇" : "🔊"; }
        bgm.ontimeupdate = () => {
            if(!isNaN(bgm.duration)) {
                prog.max = Math.floor(bgm.duration); prog.value = Math.floor(bgm.currentTime);
                document.getElementById('cur-time').innerText = formatTime(bgm.currentTime);
                document.getElementById('dur-time').innerText = "-" + formatTime(bgm.duration - bgm.currentTime);
            }
        };
        prog.oninput = () => { bgm.currentTime = prog.value; };
        function formatTime(s) { let m = Math.floor(s/60), sec = Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }

        function toggleMode(type) {
            modes[type] = !modes[type];
            document.getElementById(`${type}-toggle`).classList.toggle('on', modes[type]);
            if(type === 'dark') document.body.classList.toggle('dark-mode', modes.dark);
        }

        function updateLight(e) {
            if(modes.dark) {
                document.body.style.setProperty('--x', e.clientX + 'px');
                document.body.style.setProperty('--y', e.clientY + 'px');
            }
        }

        // --- 核心遊戲邏輯 ---
        function setupGame() {
            const conf = levels[currentLv];
            const grid = document.getElementById('game-grid');
            grid.innerHTML = ''; flipped = []; matches = 0; lock = false;
            scores = [0, 0]; currentPlayer = 0;
            updateUI();
            
            clearInterval(shakeTimer);
            if(modes.shake) shakeTimer = setInterval(earthquake, 10000);

            let selected = imgNames.slice(0, conf.cards / 2);
            let deck = [...selected, ...selected].sort(() => Math.random() - 0.5);

            grid.style.gridTemplateColumns = `repeat(${conf.cols}, 1fr)`;
            deck.forEach(name => {
                const card = document.createElement('div');
                card.className = `card ${conf.size}`;
                card.dataset.img = name;
                card.innerHTML = `<div class="card-back"></div><div class="card-front"><img src="${name}" onerror="this.src='https://via.placeholder.com/50?text=Err'"></div>`;
                card.onclick = () => {
                    if (lock || card.classList.contains('flipped') || card.classList.contains('matched')) return;
                    card.classList.add('flipped');
                    flipped.push(card);
                    if (flipped.length === 2) check();
                };
                grid.appendChild(card);
            });
        }

        function check() {
            lock = true;
            const [c1, c2] = flipped;
            if (c1.dataset.img === c2.dataset.img) {
                // 配對成功
                setTimeout(() => {
                    c1.classList.replace('flipped', 'matched');
                    c2.classList.replace('flipped', 'matched');
                    scores[currentPlayer]++;
                    matches++;
                    updateUI();
                    flipped = []; lock = false;
                    if (matches === levels[currentLv].cards / 2) handleVictory();
                }, 400);
            } else {
                // 配對失敗，換人
                setTimeout(() => {
                    c1.classList.remove('flipped');
                    c2.classList.remove('flipped');
                    flipped = [];
                    switchPlayer();
                    lock = false;
                }, 1000);
            }
        }

        function switchPlayer() {
            currentPlayer = currentPlayer === 0 ? 1 : 0;
            updateUI();
            const overlay = document.getElementById('turn-overlay');
            overlay.innerText = `玩家 ${currentPlayer + 1} 的回合！`;
            overlay.style.display = 'block';
            setTimeout(() => overlay.style.display = 'none', 800);
        }

        function updateUI() {
            document.getElementById('p1-score').innerText = scores[0];
            document.getElementById('p2-score').innerText = scores[1];
            
            document.getElementById('p1-box').classList.toggle('active', currentPlayer === 0);
            document.getElementById('p2-box').classList.toggle('active', currentPlayer === 1);
            
            document.getElementById('p1-status').innerText = currentPlayer === 0 ? "YOUR TURN" : "WAITING";
            document.getElementById('p2-status').innerText = currentPlayer === 1 ? "YOUR TURN" : "WAITING";
            
            document.querySelectorAll('.lv-btn').forEach((b, i) => b.classList.toggle('active', i === currentLv));
        }

        function earthquake() {
            const grid = document.getElementById('game-grid');
            grid.classList.add('shake');
            setTimeout(() => {
                grid.classList.remove('shake');
                let cards = Array.from(grid.children);
                cards.sort(() => Math.random() - 0.5);
                cards.forEach(c => grid.appendChild(c));
            }, 500);
        }

        function handleVictory() {
            let winnerText = "";
            if (scores[0] > scores[1]) winnerText = `🏆 玩家 1 獲勝！ (${scores[0]} vs ${scores[1]})`;
            else if (scores[1] > scores[0]) winnerText = `🏆 玩家 2 獲勝！ (${scores[1]} vs ${scores[0]})`;
            else winnerText = "🤝 平手！大家都是神奇寶貝大師。";
            
            alert(winnerText);
            setupGame();
        }

        function changeLevel(i) { currentLv = i; setupGame(); }
        setupGame();
    </script>
</body>
</html>
